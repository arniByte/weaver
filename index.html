<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#000000">
<title>WEAVER — sequencer</title>
<meta name="description" content="Minimal browser groovebox: house / deep techno / techno / edm / dnb. Auto-DJ mode, 100% procedural Web Audio synthesis, load your own audio.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23000'/%3E%3Crect x='6' y='6' width='4' height='4' fill='%2300ff41'/%3E%3C/svg%3E">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header id="top">
  <div class="hrow">
    <div id="brand">WEAVER<span class="dim">/SEQ.03</span></div>
    <span id="by">BY ARNI</span>
    <button id="play" title="space">&#9654;</button>
    <button id="auto" title="self-mixing dj set">AUTO</button>
    <button id="abars" title="bars per groove before AUTO changes the track">32BR</button>
    <span id="autostat"></span>
    <div id="presets"></div>
    <span class="spacer"></span>
    <button id="clear" title="clear all steps">CLR</button>
    <button id="random" title="random pattern">RND</button>
    <button id="share" title="copy link with current state">URL</button>
  </div>
  <div class="hrow" id="masters">
    <label class="bigsl"><span class="t">BPM</span><input id="bpm" type="range" min="60" max="200" step="1"><output id="bpm-v"></output></label>
    <label class="bigsl"><span class="t">SWG</span><input id="swing" type="range" min="50" max="75" step="1"><output id="swing-v"></output></label>
    <label class="bigsl flt" title="dj filter: left LP / right HP / double-click reset"><span class="t">FLT</span><input id="filter" type="range" min="-1" max="1" step="0.01"><output id="filter-v"></output></label>
    <label class="bigsl"><span class="t">PMP</span><input id="pump" type="range" min="0" max="1" step="0.01"><output id="pump-v"></output></label>
    <label class="bigsl"><span class="t">OUT</span><input id="master" type="range" min="0" max="1" step="0.01"><output id="master-v"></output></label>
  </div>
</header>

<div id="vizwrap">
  <canvas id="viz"></canvas>
</div>

<main id="gridwrap">
  <div id="grid"></div>
  <div id="pool"></div>
  <section id="decks">
    <div class="dhead">
      <span class="plabel">DJ DECKS</span>
      <button id="automix" title="auto-mix the whole sample pool like a dj">AUTOMIX</button>
      <button id="xfade" title="crossfade length">XFD 8S</button>
      <button id="deckstop" title="stop decks">STOP</button>
      <span id="deckstat" class="dim"></span>
    </div>
    <div class="deck" data-deck="0">
      <span class="dl">A</span><span class="dn">—</span>
      <div class="dbar"><i></i></div><span class="dt">0:00</span>
    </div>
    <div class="deck" data-deck="1">
      <span class="dl">B</span><span class="dn">—</span>
      <div class="dbar"><i></i></div><span class="dt">0:00</span>
    </div>
  </section>
</main>

<div id="wallwrap">
  <canvas id="wall"></canvas>
</div>

<footer>
  <span>32 STEPS &middot; CLICK&thinsp;=&thinsp;STEP &middot; SHIFT+CLICK&thinsp;=&thinsp;ACCENT &middot; DRAG BS/LD/PL/SP CELL&thinsp;=&thinsp;PITCH/SLICE &middot; SPACE&thinsp;=&thinsp;RUN &middot; 1&ndash;5&thinsp;=&thinsp;PRESET &middot; A&thinsp;=&thinsp;AUTO</span>
  <span class="dim">WEAVER BY ARNI &middot; PROCEDURAL SYNTHESIS + YOUR TRACKS &middot; WEB AUDIO</span>
</footer>

<input id="file" type="file" accept="audio/*" multiple hidden>

<script type="module" src="js/main.js"></script>
</body>
</html>
